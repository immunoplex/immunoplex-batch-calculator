# =============================================================================
# docker-compose.yml — Local Development Stack
#
# Services:
#   redis   — Redis 7 for job queue and status
#   api     — FastAPI batch job API (port 8000)
#   worker  — R worker with Python supervisor
#
# Usage:
#   docker compose up --build
#
#   # Submit a job:
#   curl -X POST http://localhost:8000/jobs \
#     -H "Content-Type: application/json" \
#     -H "X-API-Key: dev-key-immunoplex" \
#     -d '{"project_id":1,"study":"MY_STUDY","experiment":"EXP1","scope":"experiment"}'
#
#   # Check status:
#   curl -H "X-API-Key: dev-key-immunoplex" http://localhost:8000/jobs/{job_id}
#
#   # Swagger docs:
#   open http://localhost:8000/docs
# =============================================================================

services:

  redis:
    image: redis:7
    ports:
      - "6380:6379"
    command: ["redis-server", "--requirepass", "devpassword"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "devpassword", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_AUTH: devpassword
      REDIS_DB: "0"
      API_KEY: dev-key-immunoplex
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./worker
    environment:
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_AUTH: devpassword
      REDIS_DB: "0"
      # PostgreSQL — update these to match your local database
      DB_NAME: ${DB_NAME:-postgres}
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
